<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmação de Presença</title>

  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      font-family: 'Amatic SC', cursive;
      background: black;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;

      background-color: #000;
      background-image: url("https://ysmmCF.github.io/Dudaconvitenovo/Fundo%20confirmacao%20de%20presen%C3%A7a%20.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }

    .container {
      width: 100%;
      max-width: 420px;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      text-align: center;
      padding: 15px;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* INPUT DO NOME */
    .nome-box {
      width: 100%;
      margin-top: 200px;
      margin-bottom: 50px;
    }

    .nome-box input {
      width: 100%;
      padding: 8px 10px;
      font-size: 1.4em;
      border-radius: 14px;
      border: 2px solid rgba(255, 212, 0, 0.9);
      outline: none;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(6px);
      color: #fff;
      text-align: center;
      box-shadow: 0 0 12px rgba(255, 212, 0, 0.22);
    }

    .nome-box input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    /* BOTÕES SIM/NÃO */
    .radios {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
    }

    .radios label {
      width: 100%;
      font-size: 1.55em;
      padding: 12px;
      border-radius: 18px;
      cursor: pointer;

      background: rgba(255, 255, 255, 0.10);
      border: 2px solid rgba(255, 212, 0, 0.85);
      color: #fff;

      backdrop-filter: blur(6px);
      box-shadow: 0 0 12px rgba(0,0,0,0.25);
      transition: 0.25s;
    }

    .radios label:hover {
      transform: scale(1.02);
      box-shadow: 0 0 18px rgba(255, 212, 0, 0.25);
    }

    .radios input {
      display: none;
    }

    .radios span {
      display: block;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.55);
    }

    /* QUANDO SELECIONAR */
    .radios input:checked + span {
      background: rgba(255, 212, 0, 0.85);
      color: #4b006f;
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 0 14px rgba(255, 212, 0, 0.5);
      text-shadow: none;
    }

    /* BOTÃO ENVIAR */
    button {
      margin-top: 14px;
      padding: 11px 0;
      width: 100%;
      font-size: 1.9em;
      border: none;
      border-radius: 26px;
      cursor: pointer;

      background: linear-gradient(to bottom, #ffe27a, #ffd400);
      color: #4b006f;
      font-weight: bold;

      box-shadow: 0 6px 14px rgba(0,0,0,0.35);
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
    }

    button:active {
      transform: scale(0.97);
    }

    #msg {
      margin-top: 10px;
      font-size: 1.6em;
      color: #ffd400;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.65);
    }

    /* BRILHINHOS */
    .spark {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #ffd400;
      border-radius: 50%;
      animation: sparkle 0.8s forwards;
      pointer-events: none;
      opacity: 0.95;
      box-shadow: 0 0 12px rgba(255, 212, 0, 0.9);
    }

    @keyframes sparkle {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0.3); }
    }
  </style>
</head>

<body>

  <div class="container">
    <form id="form">

      <div class="nome-box">
        <input type="text" name="nome" placeholder="Digite seu nome" required>
      </div>

      <div class="radios">
        <label>
          <input type="radio" name="presenca" value="Sim, estarei lá!" required>
          <span>Sim, estarei lá!</span>
        </label>

        <label>
          <input type="radio" name="presenca" value="Não poderei participar" required>
          <span>Não poderei participar.</span>
        </label>
      </div>

      <button type="submit">Enviar</button>
    </form>

    <p id="msg"></p>
  </div>


  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const webAppUrl = "https://script.google.com/macros/s/AKfycbx3DvKzsaCp6SsYynqIjaZzqpI4reIo40fc_soDczlO0VAC3Q1rtDYlHiwtVXYMGxTN/exec";  

    form.addEventListener('submit', e => {
      e.preventDefault();
      e.preventDefault();

msg.innerText = "Enviando...";
msg.style.color = "#ffd400";

      for(let i=0;i<10;i++){
        const spark = document.createElement('div');
        spark.className = 'spark';
        const x = (Math.random()-0.5)*120 + 'px';
        const y = (Math.random()-0.5)*120 + 'px';
        spark.style.setProperty('--x', x);
        spark.style.setProperty('--y', y);
        spark.style.left = '50%';
        spark.style.top = '50%';
        form.appendChild(spark);
        setTimeout(()=>spark.remove(),800);
      }

      const formData = new FormData(form);
      fetch(webAppUrl, { method:'POST', body: formData })
        .then(res => res.text())
        .then(() => {
          msg.innerText = "Sua resposta foi enviada com sucesso!";
          form.reset();
        })
        .catch(() => {
          msg.innerText = "Ocorreu um erro ao enviar. Tente novamente.";
          msg.style.color = "red";
        });
    });
  </script>

</body>
</html>
