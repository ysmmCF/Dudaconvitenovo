<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Convite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonte Cormorant Garamond -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  overflow-y: auto;
  font-family: 'Cormorant Garamond', serif;
}

/* ===== CONVITE ===== */
#convite {
  width: 100%;
  display: flex;
  justify-content: center;
}

/* Container segue o tamanho real da imagem */
#conteudo {
  width: 100%;
  position: relative;
  overflow: hidden; /* ISSO impede qualquer coisa de vazar da imagem */
}

/* IMAGEM INTEIRA SEM CORTAR */
#conteudo img {
  width: 100%;
  height: auto;
  display: block;
}

/* ===== BOTÕES ===== */
#botoes {
  position: absolute;
  top: 52%;
  left: 62%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 22px;
  width: 85%;
  max-width: 340px;
  z-index: 15;
}

.botao {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: #ffd86b;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

/* Bolinha roxa */
.icone {
  width: 57px;
  height: 57px;
  background: #4b1e78;
  border: 2px solid #ffd86b;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0px 0px 10px rgba(255, 216, 107, 0.4);
  transition: 0.3s;
}

/* Ícone amarelo */
.icone .material-icons {
  color: #ffd86b;
  font-size: 28px;
  font-family: 'Material Icons';
  font-style: normal;
  font-weight: normal;
  line-height: 1;
  letter-spacing: normal;
  text-transform: none;
  display: inline-block;
  white-space: nowrap;
  word-wrap: normal;
  direction: ltr;
  -webkit-font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased;
}

/* Hover */
.botao:hover .icone {
  transform: scale(1.08);
  background: #5e2a94;
}

/* ===== BOTÃO DE MÚSICA ===== */
#music-btn {
  position: absolute;
  top: 24%;
  right: 20%;
  background: rgba(75, 30, 120, 0.85);
  border: 2px solid #ffd86b;
  color: #ffd86b;
  padding: 12px 70px;
  border-radius: 18px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 700;
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0px 0px 15px rgba(255, 216, 107, 0.25);
}

#music-btn:hover {
  background: rgba(94, 42, 148, 0.9);
}

/* ===== POP-UP ===== */
#popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  z-index: 40;
}

#popup.active {
  opacity: 1;
  pointer-events: all;
}

#popup-content {
  background: #4b1e78;
  border: 2px solid #ffd86b;
  color: #ffd86b;
  padding: 35px 40px;
  border-radius: 20px;
  text-align: center;
  max-width: 400px;
  width: 95%;
  box-shadow: 0 6px 25px rgba(0,0,0,0.7);
  position: relative;
  font-size: 22px;
}

#popup-close {
  position: absolute;
  top: 10px;
  right: 14px;
  cursor: pointer;
  font-size: 34px;
  color: #ffd86b;
}

/* ===== CONTAGEM REGRESSIVA ===== */
#countdown-box {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  z-index: 25;
  text-align: center;

  padding: 26px 16px;
  border-radius: 18px;

  background: rgba(75, 30, 120, 0.75);
  border: 2px solid #ffd86b;
  box-shadow: 0px 0px 14px rgba(255, 216, 107, 0.3);

  font-family: 'Cormorant Garamond', serif;
  color: #ffd86b;

  width: min(80%, 340px);

  bottom: 0; /* base */
}

#countdown-title {
  font-size: clamp(19px, 3vw, 29px);
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

#countdown-time {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(6px, 2vw, 12px);
}

.time-box {
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 216, 107, 0.5);
  border-radius: 14px;
  padding: clamp(6px, 2vw, 14px) 6px;
}

.time-number {
  font-size: clamp(30px, 5vw, 45px);
  font-weight: 700;
  line-height: 1;
}

.time-label {
  font-size: clamp(19px, 2.5vw, 20px);
  font-weight: 600;
  margin-top: 6px;
  opacity: 0.95;
}
</style>
</head>

<body>

<div id="convite">
  <div id="conteudo">

    <!-- Fundo -->
    <img src="https://ysmmCF.github.io/Dudaconvitenovo/Fundoconviteduda2.png" alt="Convite Eduarda">

    <!-- Botão Música -->
    <button id="music-btn" onclick="toggleMusic()">
      <span class="material-icons">music_note</span>
      Tocar música
    </button>

    <!-- Botões -->
    <div id="botoes">

      <a href="https://ysmmCF.github.io/Dudaconvitenovo/Confimacaodepresenca.html" class="botao" id="btnPresenca">
        <div class="icone">
          <span class="material-icons">check_circle</span>
        </div>
        Confirmar presença
      </a>

      <a href="https://ysmmCF.github.io/Dudaconvitenovo/Dresscode.png" class="botao" id="btnDress">
        <div class="icone">
          <span class="material-icons">checkroom</span>
        </div>
        Dress code
      </a>

      <a href="https://ysmmCF.github.io/Dudaconvitenovo/Fundo%20sugest%C3%A3o%20de%20presente%20.png" class="botao" id="btnpresent">
        <div class="icone">
          <span class="material-icons">card_giftcard</span>
        </div>
        Sugestão de presentes
      </a>

      <a href="https://ysmmCF.github.io/Dudaconvitenovo/Manualdoconvidado.png" class="botao" id="btnManual">
        <div class="icone">
          <span class="material-icons">menu_book</span>
        </div>
        Manual do convidado
      </a>

      <a href="https://maps.app.goo.gl/vd4Cct5d9Qnfqj319" class="botao" id="btnLocalizacao">
        <div class="icone">
          <span class="material-icons">place</span>
        </div>
        Localização
      </a>

    </div>

  </div>
</div>

  <!-- CONTAGEM REGRESSIVA -->
<div id="countdown-box">
  <div id="countdown-title">Faltam...</div>

  <div id="countdown-time">
    <div class="time-box">
      <div class="time-number" id="days">00</div>
      <div class="time-label">dias</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="hours">00</div>
      <div class="time-label">horas</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="minutes">00</div>
      <div class="time-label">min</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="seconds">00</div>
      <div class="time-label">seg</div>
    </div>
  </div>
</div>
<!-- POP-UP -->
<div id="popup">
  <div id="popup-content">
    <div id="popup-close">&times;</div>
    <p>O convite é interativo<br>Fique à vontade para clicar nos botões! <br><br> Confirme presença até o dia 25/11</p>
  </div>
</div>

<!-- Música -->
<audio id="music" loop>
  <source src="https://ysmmCF.github.io/ConviteFesta/I See The Light (From _Tangled_) [YTKv0PNGDao].mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");
const musicBtn = document.getElementById("music-btn");

let tocando = false;

function toggleMusic() {
  if (!tocando) {
    music.play();
    musicBtn.innerHTML = `<span class="material-icons">pause</span> Pausar música`;
    tocando = true;
  } else {
    music.pause();
    musicBtn.innerHTML = `<span class="material-icons">music_note</span> Tocar música`;
    tocando = false;
  }
}

/* ===== POP-UP ===== */
const popup = document.getElementById("popup");
const close = document.getElementById("popup-close");

setTimeout(() => {
  popup.classList.add("active");
}, 2000);

close.addEventListener("click", () => {
  popup.classList.remove("active");
});

/* ===== CONTAGEM REGRESSIVA ===== */
function atualizarContagem() {
  const destino = new Date("December 10, 2026 00:00:00").getTime();
  const agora = new Date().getTime();
  const distancia = destino - agora;

  if (distancia <= 0) {
    document.getElementById("countdown-title").innerText = "CHEGOU O GRANDE DIA!";
    document.getElementById("days").innerText = "00";
    document.getElementById("hours").innerText = "00";
    document.getElementById("minutes").innerText = "00";
    document.getElementById("seconds").innerText = "00";
    return;
  }

  const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
  const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

  document.getElementById("days").innerText = String(dias).padStart(2, "0");
  document.getElementById("hours").innerText = String(horas).padStart(2, "0");
  document.getElementById("minutes").innerText = String(minutos).padStart(2, "0");
  document.getElementById("seconds").innerText = String(segundos).padStart(2, "0");
}

setInterval(atualizarContagem, 1000);
atualizarContagem();
  
function travarCountdownNoFim() {
  const conteudo = document.getElementById("conteudo");
  const countdown = document.getElementById("countdown-box");

  if (!conteudo || !countdown) return;

  // quanto você quer empurrar pra baixo (se botar 200, ele tenta)
  const tentativaDescer = 200;

  // altura do conteudo (imagem)
  const alturaConteudo = conteudo.offsetHeight;

  // altura da caixa countdown
  const alturaCountdown = countdown.offsetHeight;

  // posição máxima permitida (muro)
  const maxTop = alturaConteudo - alturaCountdown;

  // posição que você quer (ele tenta ir pra baixo)
  let topDesejado = maxTop + tentativaDescer;

  // trava no limite
  if (topDesejado > maxTop) topDesejado = maxTop;

  countdown.style.top = topDesejado + "px";
  countdown.style.bottom = "auto";
}

window.addEventListener("load", travarCountdownNoFim);
window.addEventListener("resize", travarCountdownNoFim);
</script>
 
</script>

</body>
</html>
